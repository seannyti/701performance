services:
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - public
      - portal
      - api
    restart: unless-stopped

  public:
    build:
      context: ./src/public
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    restart: unless-stopped

  portal:
    build:
      context: ./src/portal
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_BASE_URL: /portal/
    restart: unless-stopped

  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__DefaultConnection=Server=db;Port=3306;Database=${DB_NAME};User=${DB_USER};Password=${DB_PASSWORD};
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - AllowedOrigins__0=${SITE_URL}
      - SiteUrl=${SITE_URL}
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
    volumes:
      - uploads:/app/wwwroot/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  uploads:
