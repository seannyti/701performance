services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5226:5226"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DatabaseProvider=MySQL
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - JwtSettings__SecretKey=${JWT_SECRET}
    volumes:
      - uploads:/app/wwwroot/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5226/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://23.239.26.52:5226
        VITE_ADMIN_URL: http://23.239.26.52:81
    image: app-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    ports:
      - "81:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  uploads:
    driver: local
