services:
  api:
    build:
      context: ./mperformancepower.Api
      dockerfile: Dockerfile
    container_name: mpp_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Server=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Uid=${DB_USER};Pwd=${DB_PASSWORD};SslMode=Required;"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      App__PublicUrl: ${APP_PUBLIC_URL}
    volumes:
      - ./mperformancepower.Api/wwwroot/uploads:/app/wwwroot/uploads
    networks:
      - mpp_net

  public:
    build:
      context: ./mperformancepower-public
      dockerfile: Dockerfile
    container_name: mpp_public
    restart: unless-stopped
    networks:
      - mpp_net

  admin:
    build:
      context: ./mperformancepower-admin
      dockerfile: Dockerfile
    container_name: mpp_admin
    restart: unless-stopped
    networks:
      - mpp_net

  nginx:
    image: nginx:alpine
    container_name: mpp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/minotperformancepowersports.com/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/minotperformancepowersports.com/privkey.pem:/etc/nginx/certs/privkey.pem:ro
    depends_on:
      - api
      - public
      - admin
    networks:
      - mpp_net

networks:
  mpp_net:
    driver: bridge
