services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5226:5226"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DatabaseProvider=MySQL
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - JwtSettings__SecretKey=${JWT_SECRET}
      - Linode__ApiToken=${LINODE_API_TOKEN}
      - Linode__Nodes__0__Id=${LINODE_NODE_0_ID}
      - Linode__Nodes__0__Label=${LINODE_NODE_0_LABEL}
    volumes:
      - uploads:/app/wwwroot/uploads
      - backups:/app/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5226/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: https://minotperformancepowersports.com
        VITE_ADMIN_URL: https://minotperformancepowersports.com:444
    image: app-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        VITE_API_URL: https://minotperformancepowersports.com:444
    ports:
      - "81:81"
      - "444:444"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  uploads:
    driver: local
  backups:
    driver: local
