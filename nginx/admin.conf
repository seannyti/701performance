# Redirect HTTP port 81 -> HTTPS port 444
server {
    listen 81;
    server_name minotperformancepowersports.com;
    return 301 https://minotperformancepowersports.com:444$request_uri;
}

# HTTPS admin on port 444
server {
    listen 444 ssl;
    server_name minotperformancepowersports.com;

    ssl_certificate /etc/letsencrypt/live/minotperformancepowersports.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minotperformancepowersports.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API, uploads, and SignalR to backend
    location ^~ /api/ {
        proxy_pass http://api:5226;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /uploads/ {
        proxy_pass http://api:5226;
        proxy_set_header Host $host;
    }

    location ^~ /hubs/ {
        proxy_pass http://api:5226;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ^~ /health {
        proxy_pass http://api:5226;
        proxy_set_header Host $host;
    }

    # SPA fallback for Vue Router history mode
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml application/font-woff;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
