events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;

    # Use Docker's internal DNS with a short TTL so nginx re-resolves
    # after containers are rebuilt (prevents stale-IP blank pages).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── HTTP: redirect everything to HTTPS ─────────────────────────────
    server {
        listen 80;
        server_name minotperformancepowersports.com www.minotperformancepowersports.com;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ───────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name minotperformancepowersports.com www.minotperformancepowersports.com;
        http2 on;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern TLS only
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Security headers ──────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss:; frame-src https://www.youtube.com https://www.youtube-nocookie.com; frame-ancestors 'none';" always;

        # ── API — REST + SignalR WebSocket upgrade ────────────────────
        location /api/ {
            set $api_upstream http://api:8080;
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
        }

        # ── Static uploads served by API ──────────────────────────────
        location /uploads/ {
            set $api_upstream http://api:8080;
            proxy_pass         $api_upstream;
            proxy_set_header   Host $host;
        }

        # ── Admin panel ───────────────────────────────────────────────
        location = /admin {
            return 301 /admin/;
        }

        location /admin/ {
            set $admin_upstream http://admin;
            rewrite ^/admin/(.*)$ /$1 break;
            proxy_pass         $admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Public site (catch-all) ───────────────────────────────────
        location / {
            set $public_upstream http://public;
            proxy_pass         $public_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}
