server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Strip /admin/ prefix so assets and routes resolve correctly.
    # This fires for direct port-5174 access where /admin/* arrives unprefixed.
    location /admin/ {
        rewrite ^/admin/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    # Catch-all: handles requests that already have the prefix stripped
    # (i.e. when coming through the nginx reverse proxy on port 8080).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache index.html so users always get the latest JS bundle references
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
